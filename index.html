<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Script PDF Downloader</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="color-scheme" content="dark light" />
</head>

<body>
  <main class="wrap">
    <header class="header">
      <h1>Script PDF Downloader</h1>
      <p class="lead">
        GitHub上のフォルダ（例：<code>一石二鳥/pdf</code>）からPDF一覧を取得し、クリックでダウンロードできます。
      </p>
    </header>

    <section class="panel">
      <div class="row">
        <div class="field">
          <label for="searchInput">フォルダ検索</label>
          <input id="searchInput" type="text" placeholder="例：一石二鳥" />
        </div>

        <div class="field">
          <label for="lessonSelect">フォルダ選択</label>
          <select id="lessonSelect">
            <option value="">読み込み中…</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button id="reloadBtn" class="btn">再読み込み</button>
        <a id="openGithubFolder" class="btn ghost" href="#" target="_blank" rel="noreferrer">GitHubで開く</a>
        <button id="copyLinksBtn" class="btn ghost">リンクをコピー</button>
        <div id="status" class="status"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panelHead">
        <h2>PDF一覧</h2>
      </div>
      <div id="fileList" class="list">
        <p class="muted">フォルダを選択してください。</p>
      </div>
    </section>

    <section class="panel small">
      <details>
        <summary>想定ディレクトリ構造</summary>
        <pre class="tree"><code>/
├─ index.html
├─ styles.css
├─ script.js
└─ 一石二鳥/
   └─ pdf/
      ├─ 1_日本語.pdf
      ├─ 2_英語.pdf
      ├─ 3_インドネシア語.pdf
      └─ ...</code></pre>
      </details>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
